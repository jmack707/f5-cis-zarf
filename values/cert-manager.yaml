# values/cert-manager.yaml
# ---------------------------------------------------------------------------
# Helm values for cert-manager OCI chart oci://quay.io/jetstack/charts/cert-manager
# Current version: v1.20.2
# Reference: https://cert-manager.io/docs/installation/helm/
# All ###ZARF_VAR_*### tokens are substituted by Zarf at deploy time.
# ---------------------------------------------------------------------------

# Install CRDs as part of the Helm release.
# NOTE: parameter renamed from installCRDs (deprecated) to crds.enabled in v1.15+
crds:
  enabled: true
  # Keep CRDs on helm uninstall to prevent accidental data loss.
  # Matches the default chart behavior since v1.15.
  keep: true

replicaCount: 1

# ---------------------------------------------------------------------------
# Image configuration — Zarf rewrites repository at deploy time.
# ---------------------------------------------------------------------------
image:
  repository: quay.io/jetstack/cert-manager-controller
  tag: "###ZARF_VAR_CERT_MANAGER_VERSION###"
  pullPolicy: IfNotPresent

cainjector:
  enabled: true
  replicaCount: 1
  image:
    repository: quay.io/jetstack/cert-manager-cainjector
    tag: "###ZARF_VAR_CERT_MANAGER_VERSION###"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

webhook:
  replicaCount: 1
  image:
    repository: quay.io/jetstack/cert-manager-webhook
    tag: "###ZARF_VAR_CERT_MANAGER_VERSION###"
    pullPolicy: IfNotPresent
  timeoutSeconds: 30
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# startupapicheck is a one-shot Job that validates the webhook TLS is ready.
# It uses a separate image; Zarf must have it bundled to run in air-gap.
startupapicheck:
  enabled: true
  image:
    repository: quay.io/jetstack/cert-manager-startupapicheck
    tag: "###ZARF_VAR_CERT_MANAGER_VERSION###"
    pullPolicy: IfNotPresent

# acmesolver image is referenced by the chart for ACME HTTP01 challenges.
# Bundle it even if you don't plan to use ACME in the air-gap environment —
# the chart will fail to start pods if the image isn't available.
acmesolver:
  image:
    repository: quay.io/jetstack/cert-manager-acmesolver
    tag: "###ZARF_VAR_CERT_MANAGER_VERSION###"

# ---------------------------------------------------------------------------
# Resources for the main controller
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ---------------------------------------------------------------------------
# Prometheus metrics
# ---------------------------------------------------------------------------
prometheus:
  enabled: true
  servicemonitor:
    enabled: false

# ---------------------------------------------------------------------------
# Node placement
# ---------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}

global:
  logLevel: 2
