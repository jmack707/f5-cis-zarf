# values/cert-manager.yaml
# ---------------------------------------------------------------------------
# Helm values for jetstack/cert-manager chart v1.19.1
# All ###ZARF_VAR_*### tokens are substituted by Zarf at deploy time.
# Reference: https://cert-manager.io/docs/installation/helm/#configuration
# ---------------------------------------------------------------------------

# Install cert-manager CRDs as part of the Helm release.
# This is the recommended approach for air-gapped environments because it
# keeps CRD lifecycle tied to the chart. An alternative is to apply CRDs
# separately with `kubectl apply -f`, but that's harder to manage in Zarf.
installCRDs: true

# Replica count for the main cert-manager controller.
replicaCount: 1

# ---------------------------------------------------------------------------
# Image configuration — Zarf rewrites these at deploy time.
# ---------------------------------------------------------------------------
image:
  repository: quay.io/jetstack/cert-manager-controller
  tag: "###ZARF_VAR_CERT_MANAGER_VERSION###"
  pullPolicy: IfNotPresent

# Cainjector manages CA bundle injection into webhook configurations.
cainjector:
  enabled: true
  replicaCount: 1
  image:
    repository: quay.io/jetstack/cert-manager-cainjector
    tag: "###ZARF_VAR_CERT_MANAGER_VERSION###"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Webhook handles admission validation for cert-manager CRs.
webhook:
  replicaCount: 1
  image:
    repository: quay.io/jetstack/cert-manager-webhook
    tag: "###ZARF_VAR_CERT_MANAGER_VERSION###"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # Timeout for webhook calls — increase if you see admission timeout errors.
  timeoutSeconds: 30

# ---------------------------------------------------------------------------
# Resource limits for the main controller.
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ---------------------------------------------------------------------------
# Prometheus metrics — expose for Grafana/Prometheus Operator if present.
# ---------------------------------------------------------------------------
prometheus:
  enabled: true
  servicemonitor:
    enabled: false   # Set true if Prometheus Operator is installed.
    prometheusInstance: default
    targetPort: 9402
    path: /metrics
    interval: 60s
    scrapeTimeout: 30s

# ---------------------------------------------------------------------------
# DNS config — required in some air-gapped environments where internal DNS
# resolution of ACME challenge records may be slow.
# ---------------------------------------------------------------------------
# dnsConfig:
#   nameservers:
#     - 10.0.0.10

# Node placement — leave empty for lab.
nodeSelector: {}
tolerations: []
affinity: {}

# Global options
global:
  # Set to true to log additional information about cert-manager internals.
  logLevel: 2
