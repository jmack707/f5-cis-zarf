# values/nginx-ingress.yaml
# ---------------------------------------------------------------------------
# Helm values for nginx/nginx-ingress chart v2.5.3 (NGINX Plus)
# Reference: https://docs.nginx.com/nginx-ingress-controller/install/helm/plus/
# All ###ZARF_VAR_*### tokens are substituted by Zarf at deploy time.
# ---------------------------------------------------------------------------

controller:
  # ---------------------------------------------------------------------------
  # Image — Zarf rewrites repository at deploy time to its internal registry.
  # NAP variant: nginx-ic-nap/nginx-plus-ingress
  # Non-NAP:     nginx-ic/nginx-plus-ingress
  # ---------------------------------------------------------------------------
  image:
    repository: private-registry.nginx.com/nginx-ic-nap/nginx-plus-ingress
    tag: "###ZARF_VAR_NGINX_VERSION###"
    pullPolicy: IfNotPresent

  # NGINX Plus (required for App Protect WAF and mgmt block below)
  nginxplus: true

  kind: deployment
  replicaCount: 1

  # ---------------------------------------------------------------------------
  # NGINX Plus license management (required as of NIC 5.x)
  # nplus-license is a generic secret created from license.jwt:
  #   kubectl create secret generic nplus-license --from-file license.jwt
  # Created by Ansible credentials_create.yaml before this chart deploys.
  # ---------------------------------------------------------------------------
  mgmt:
    licenseTokenSecretName: nplus-license

  # ---------------------------------------------------------------------------
  # App Protect WAF
  # ---------------------------------------------------------------------------
  appprotect:
    enable: true
    logLevel: warn

  appprotectdos:
    enable: false

  # ---------------------------------------------------------------------------
  # Ingress class
  # ---------------------------------------------------------------------------
  ingressClass:
    name: nginx
    setAsDefaultIngress: false

  # ---------------------------------------------------------------------------
  # Service
  # ---------------------------------------------------------------------------
  service:
    type: LoadBalancer
    externalTrafficPolicy: Local
    httpPort: 80
    httpsPort: 443
    annotations: {}

  # ---------------------------------------------------------------------------
  # ServiceAccount and imagePullSecret
  # regcred is a docker-registry secret where:
  #   username = JWT content  (not the string "jwt")
  #   password = "none"       (literally the string none)
  # Created by Ansible credentials_create.yaml.
  # Reference: https://docs.nginx.com/nginx-ingress-controller/install/helm/plus/
  # ---------------------------------------------------------------------------
  serviceAccount:
    create: true
    name: ""
    imagePullSecretName: regcred

  # ---------------------------------------------------------------------------
  # NGINX configuration
  # ---------------------------------------------------------------------------
  config:
    entries:
      keepalive: "32"
      real-ip-header: "X-Forwarded-For"
      set-real-ip-from: "0.0.0.0/0"

  # ---------------------------------------------------------------------------
  # Resources
  # ---------------------------------------------------------------------------
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1
      memory: 1Gi

  # ---------------------------------------------------------------------------
  # Custom resources and cert-manager integration
  # ---------------------------------------------------------------------------
  enableCustomResources: true
  enableCertManager: true

  # ---------------------------------------------------------------------------
  # Prometheus metrics
  # ---------------------------------------------------------------------------
  enableLatencyMetrics: true
  prometheus:
    create: true
    port: 9113
    scheme: http

  readyStatus:
    enable: true
    port: 8081

  nodeSelector: {}
  tolerations: []
  affinity: {}

rbac:
  create: true
