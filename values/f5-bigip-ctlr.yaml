# values/f5-bigip-ctlr.yaml
# ---------------------------------------------------------------------------
# Helm values for f5-stable/f5-bigip-ctlr
# Repo: https://f5networks.github.io/charts/stable
# Source: https://github.com/F5Networks/k8s-bigip-ctlr/tree/master/helm-charts/f5-bigip-ctlr
#
# IMPORTANT: the chart template uses .Values.image.user, .Values.image.repo,
# and .Values.version (top-level) for the image reference:
#   image: "{{ .Values.image.user }}/{{ .Values.image.repo }}:{{ .Values.version }}"
# Do NOT use image.tag — it does not exist in this chart.
#
# All ###ZARF_VAR_*### tokens are substituted by Zarf at deploy time.
# ---------------------------------------------------------------------------

# Secret containing BIG-IP credentials (created by Ansible credentials_create.yaml)
bigip_login_secret: bigip-login

# Image configuration — Zarf rewrites image.user/image.repo at deploy time.
image:
  user: f5networks
  repo: k8s-bigip-ctlr
  pullPolicy: IfNotPresent

# Image tag — top-level 'version' field per chart template
version: "###ZARF_VAR_CIS_VERSION###"

# CIS runtime arguments
args:
  bigip_url: "https://###ZARF_VAR_BIGIP_URL###"
  bigip_partition: "###ZARF_VAR_BIGIP_PARTITION###"
  # Watch all namespaces (empty string = cluster-wide)
  namespace: ""
  # NodePort mode — use "cluster" only with BIG-IP VXLAN CNI integration
  pool_member_type: "nodeport"
  log_level: "INFO"
  custom_resource_mode: true
  as3_validation: true

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  create: true
  name: ""

rbac:
  create: true
