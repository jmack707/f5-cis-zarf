# zarf-config.yaml
# ---------------------------------------------------------------------------
# Config file for the f5-cis-nginx-stack Zarf package.
# Reference: https://docs.zarf.dev/ref/config-files/
#
# Precedence (highest to lowest):
#   1. CLI flags
#   2. ZARF_* environment variables
#   3. This config file
#   4. Defaults in zarf.yaml
#
# Note: --confirm is NOT supported in config files. Pass it on the CLI.
# ---------------------------------------------------------------------------

package:
  create:
    # Package template variables (--set on zarf package create)
    set:
      CIS_VERSION: "2.20.3"
      NGINX_VERSION: "5.4.3"
      CERT_MANAGER_VERSION: "v1.20.2"

  deploy:
    # Comma-separated list of components to deploy.
    # Required components (f5-cis, nginx-ingress) deploy regardless.
    # cert-manager is optional — add it to this list to deploy it:
    #   components: "app-images,cert-manager"
    components: "app-images"

    # Zarf variable overrides (--set-variables on zarf package deploy)
    set:
      # ---------- BIG-IP --------------------------------------------------
      BIGIP_URL: "10.1.1.12"
      BIGIP_PARTITION: "k8s"

      # ---------- Registry ------------------------------------------------
      REGISTRY_HOST: "harbor.test.local"
      REGISTRY_PROJECT: "library"

      # ---------- Component versions -------------------------------------
      CIS_VERSION: "2.20.3"
      NGINX_VERSION: "5.4.3"
      CERT_MANAGER_VERSION: "v1.20.2"

      # ---------- cert-manager -------------------------------------------
      CLUSTER_ISSUER: "lab-self-signed"
