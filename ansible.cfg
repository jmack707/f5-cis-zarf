# ansible.cfg
# ---------------------------------------------------------------------------
# Ansible configuration for the F5 CIS deployment.
# Place this file in the project root (same directory as zarf.yaml).
# ---------------------------------------------------------------------------
[defaults]
inventory          = inventory/hosts
roles_path         = roles
host_key_checking  = False
retry_files_enabled = False
stdout_callback    = yaml

# Use the kubernetes.core collection for k8s module
# Install with: ansible-galaxy collection install kubernetes.core
collections_path   = ~/.ansible/collections

[privilege_escalation]
become      = False
become_method = sudo
