---
# ccn-cis/credentials_create.yaml
# ---------------------------------------------------------------------------
# Creates the Kubernetes secrets required by F5 CIS and NGINX Plus BEFORE
# the Zarf package is deployed.
#
# Secrets managed here:
#   kube-system:
#     bigip-login       — BIG-IP admin credentials for CIS
#   nginx-ingress:
#     nplus-license     — NGINX Plus JWT as a generic secret (for mgmt block)
#     regcred           — docker-registry imagePullSecret for private-registry.nginx.com
#                         username = JWT content, password = "none" (per F5 docs)
#
# Reference: https://docs.nginx.com/nginx-ingress-controller/install/helm/plus/
#
# Run order:
#   1. THIS playbook
#   2. zarf package deploy (via deploy-package.sh)
#   3. ATC/DO playbook
#   4. ATC/AS3 playbook
# ---------------------------------------------------------------------------
- name: Create Kubernetes secrets for F5 CIS and NGINX Plus
  hosts: k3s_master
  gather_facts: false
  vars:
    bigip_username: "{{ vault_bigip_username }}"
    bigip_password: "{{ vault_bigip_password }}"
    nginx_jwt_path:  "{{ vault_nginx_jwt_path }}"   # local path to license.jwt

  tasks:

    # -------------------------------------------------------------------------
    # Namespace guards
    # -------------------------------------------------------------------------
    - name: Ensure kube-system namespace exists
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: kube-system
        state: present

    - name: Ensure nginx-ingress namespace exists
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: nginx-ingress
        state: present

    # -------------------------------------------------------------------------
    # bigip-login (kube-system)
    # -------------------------------------------------------------------------
    - name: Create bigip-login secret in kube-system
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: bigip-login
            namespace: kube-system
            labels:
              app.kubernetes.io/managed-by: ansible
          type: Opaque
          stringData:
            username: "{{ bigip_username }}"
            password: "{{ bigip_password }}"
      no_log: true

    # -------------------------------------------------------------------------
    # Read JWT file
    # -------------------------------------------------------------------------
    - name: Read NGINX Plus JWT content
      slurp:
        src: "{{ nginx_jwt_path }}"
      register: nginx_jwt_raw
      delegate_to: localhost

    - name: Set JWT token fact (trimmed)
      set_fact:
        # Strip any trailing newline that editors add when saving the .jwt file
        nginx_jwt_token: "{{ nginx_jwt_raw.content | b64decode | trim }}"

    # -------------------------------------------------------------------------
    # nplus-license (nginx-ingress) — generic secret from the JWT file.
    # Used by controller.mgmt.licenseTokenSecretName in the Helm chart.
    # kubectl equivalent:
    #   kubectl create secret generic nplus-license --from-file license.jwt
    # -------------------------------------------------------------------------
    - name: Create nplus-license generic secret in nginx-ingress
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: nplus-license
            namespace: nginx-ingress
            labels:
              app.kubernetes.io/managed-by: ansible
          type: Opaque
          stringData:
            license.jwt: "{{ nginx_jwt_token }}"
      no_log: true

    # -------------------------------------------------------------------------
    # regcred (nginx-ingress) — docker-registry imagePullSecret.
    # Per F5 docs, the JWT content is the USERNAME; password is "none".
    # kubectl equivalent:
    #   kubectl create secret docker-registry regcred \
    #     --docker-server=private-registry.nginx.com \
    #     --docker-username=$(cat license.jwt) \
    #     --docker-password=none
    # -------------------------------------------------------------------------
    - name: Create regcred imagePullSecret in nginx-ingress
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: regcred
            namespace: nginx-ingress
            labels:
              app.kubernetes.io/managed-by: ansible
          type: kubernetes.io/dockerconfigjson
          data:
            .dockerconfigjson: "{{ {'auths': {'private-registry.nginx.com': {
              'username': nginx_jwt_token,
              'password': 'none',
              'auth': (nginx_jwt_token + ':none') | b64encode
            }}} | to_json | b64encode }}"
      no_log: true

    - name: Verify secrets exist
      kubernetes.core.k8s_info:
        kind: Secret
        namespace: "{{ item.ns }}"
        name: "{{ item.name }}"
      loop:
        - { ns: kube-system,   name: bigip-login    }
        - { ns: nginx-ingress, name: nplus-license  }
        - { ns: nginx-ingress, name: regcred        }
      register: secret_check
      failed_when: secret_check.resources | length == 0

    - name: Summary
      debug:
        msg:
          - "bigip-login      → kube-system"
          - "nplus-license    → nginx-ingress (JWT generic secret)"
          - "regcred          → nginx-ingress (imagePullSecret, JWT as username)"
          - "Ready to run deploy-package.sh"
