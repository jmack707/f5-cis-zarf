---
# ccn-cis/credentials_create.yaml
# ---------------------------------------------------------------------------
# Creates the Kubernetes secrets required by the F5 CIS and NGINX Plus
# components BEFORE the Zarf package is deployed.
#
# Secrets managed here:
#   - bigip-login      (kube-system)    — BIG-IP admin credentials for CIS
#   - license-token    (nginx-ingress)  — NGINX Plus JWT as imagePullSecret
#
# Run order:
#   1. THIS playbook                   ← you are here
#   2. zarf package deploy (via deploy-package.sh)
#   3. ATC/DO playbook
#   4. ATC/AS3 playbook
#
# Variables are sourced from group_vars/all.yaml and group_vars/all/vault.yaml
# (ansible-vault encrypted). Decrypt with:
#   ansible-playbook ccn-cis/credentials_create.yaml --ask-vault-pass
#   or
#   ansible-playbook ccn-cis/credentials_create.yaml --vault-password-file .vault-pass
# ---------------------------------------------------------------------------
- name: Create Kubernetes secrets for F5 CIS and NGINX Plus
  hosts: k3s_master
  gather_facts: false
  vars:
    # Override these via extra-vars or vault; do not hardcode credentials here.
    bigip_username: "{{ vault_bigip_username }}"
    bigip_password: "{{ vault_bigip_password }}"
    nginx_jwt_path:  "{{ vault_nginx_jwt_path }}"   # local path to .jwt file

  tasks:
    # -------------------------------------------------------------------------
    # Namespace guards — namespaces must exist before secrets can be created.
    # These are also created by deploy-package.sh's onDeploy actions, but
    # creating them here ensures Ansible can run independently in any order.
    # -------------------------------------------------------------------------
    - name: Ensure kube-system namespace exists
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: kube-system
        state: present

    - name: Ensure nginx-ingress namespace exists
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: nginx-ingress
        state: present

    # -------------------------------------------------------------------------
    # bigip-login
    # Used by CIS to authenticate against the BIG-IP management API.
    # Type: Opaque with keys "username" and "password".
    # -------------------------------------------------------------------------
    - name: Create bigip-login secret in kube-system
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: bigip-login
            namespace: kube-system
            labels:
              app.kubernetes.io/managed-by: ansible
          type: Opaque
          stringData:
            username: "{{ bigip_username }}"
            password: "{{ bigip_password }}"
      no_log: true   # Do not log secret values to console or Ansible output

    - name: Verify bigip-login secret was created
      kubernetes.core.k8s_info:
        kind: Secret
        name: bigip-login
        namespace: kube-system
      register: bigip_secret_check
      failed_when: bigip_secret_check.resources | length == 0

    - name: Report bigip-login status
      debug:
        msg: "bigip-login secret exists in kube-system."

    # -------------------------------------------------------------------------
    # license-token
    # Used as an imagePullSecret for pulling NGINX Plus images.
    # Type: kubernetes.io/dockerconfigjson (not Opaque).
    # Username is literally "jwt"; password is the JWT file content.
    # -------------------------------------------------------------------------
    - name: Read NGINX Plus JWT content
      slurp:
        src: "{{ nginx_jwt_path }}"
      register: nginx_jwt_raw
      delegate_to: localhost   # JWT file is on the Ansible control node

    - name: Create license-token imagePullSecret in nginx-ingress
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: license-token
            namespace: nginx-ingress
            labels:
              app.kubernetes.io/managed-by: ansible
          type: kubernetes.io/dockerconfigjson
          data:
            # The .dockerconfigjson value is base64(JSON auth config).
            # Ansible's b64encode filter handles the outer base64 layer;
            # the inner JSON is constructed inline.
            .dockerconfigjson: "{{ {'auths': {'private-registry.nginx.com': {'username': 'jwt', 'password': nginx_jwt_raw.content | b64decode | trim, 'auth': ('jwt:' + (nginx_jwt_raw.content | b64decode | trim)) | b64encode}}} | to_json | b64encode }}"
      no_log: true

    - name: Verify license-token secret was created
      kubernetes.core.k8s_info:
        kind: Secret
        name: license-token
        namespace: nginx-ingress
      register: license_check
      failed_when: license_check.resources | length == 0

    - name: Report license-token status
      debug:
        msg: "license-token imagePullSecret exists in nginx-ingress."

    - name: Final summary
      debug:
        msg:
          - "Secrets created successfully."
          - "You may now run the Zarf deploy script."
